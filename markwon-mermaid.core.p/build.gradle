afterEvaluate {
    publishing {
        publications {
            mavenRelease(MavenPublication) {
                groupId = 'com.stupidbeauty'
                artifactId = 'markwon-mermaid'
                version = '1.0.0-SNAPSHOT'
                
                // ✅ Android Library 应使用 components.java 而非 components.release
                from components.java
                
                // Optional: Add source JAR for better documentation
                withSourcesJar()
                withJavadocJar()
            }
        }
    }
}